<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold & Silber Rechner - Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .results {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
        }

        .results.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .price-value {
            font-weight: 700;
            color: #333;
        }

        .total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #667eea;
        }

        .total .price-value {
            color: #667eea;
            font-size: 20px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-top: 15px;
            display: none;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .error.show { display: block; }

        .timestamp {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
        }

        .key-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
            width: auto;
            margin: 10px auto;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💰 Edelmetall Rechner</h1>

    <div class="input-group">
        <label for="silver">🥈 Anzahl Unzen Silber</label>
        <input type="number" id="silver" min="0" step="0.01" value="0">
    </div>

    <div class="input-group">
        <label for="gold">🥇 Anzahl Unzen Gold</label>
        <input type="number" id="gold" min="0" step="0.01" value="0">
    </div>

    <button id="calculateBtn" onclick="calculateValue()">Wert berechnen</button>

    <button class="key-btn" onclick="askForApiKey()">API-Key ändern</button>

    <div class="loading" id="loading">Preise werden live abgefragt...</div>
    <div class="error" id="error"></div>

    <div class="results" id="results">
        <div class="price-item">
            <span>Silber (1 oz)</span>
            <span class="price-value" id="silverPrice">-</span>
        </div>
        <div class="price-item">
            <span>Silber Wert</span>
            <span class="price-value" id="silverTotal">-</span>
        </div>

        <div class="price-item" style="margin-top: 10px;">
            <span>Gold (1 oz)</span>
            <span class="price-value" id="goldPrice">-</span>
        </div>
        <div class="price-item">
            <span>Gold Wert</span>
            <span class="price-value" id="goldTotal">-</span>
        </div>

        <div class="price-item total">
            <span><strong>Gesamtwert</strong></span>
            <span class="price-value" id="totalValue">-</span>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>
</div>

<script>
    const API_URL = 'https://www.goldapi.io/api';

    // Beim Start: Werte aus lokalem Speicher laden
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('silver').value = localStorage.getItem('silverOunces') || 0;
        document.getElementById('gold').value = localStorage.getItem('goldOunces') || 0;
    });

    function askForApiKey() {
        const key = prompt("Bitte GoldAPI.io Key eingeben:");
        if (key) {
            localStorage.setItem('gold_api_key', key.trim());
            alert("Key gespeichert!");
        }
    }

    async function fetchPrice(symbol, key) {
        const res = await fetch(`${API_URL}/${symbol}/EUR`, {
            headers: { "x-access-token": key, "Content-Type": "application/json" }
        });
        if (!res.ok) throw new Error(res.status === 403 ? "KEY_ERROR" : "API_ERROR");
        return await res.json();
    }

    async function calculateValue() {
        const silverOz = parseFloat(document.getElementById('silver').value) || 0;
        const goldOz = parseFloat(document.getElementById('gold').value) || 0;
        const key = localStorage.getItem('gold_api_key');

        if (!key) {
            askForApiKey();
            return;
        }

        // Werte speichern
        localStorage.setItem('silverOunces', silverOz);
        localStorage.setItem('goldOunces', goldOz);

        const loader = document.getElementById('loading');
        const errDiv = document.getElementById('error');
        const resDiv = document.getElementById('results');

        errDiv.classList.remove('show');
        resDiv.classList.remove('show');
        loader.style.display = 'block';

        try {
            const [goldData, silverData] = await Promise.all([
                fetchPrice('XAU', key),
                fetchPrice('XAG', key)
            ]);

            document.getElementById('goldPrice').textContent = format(goldData.price);
            document.getElementById('goldTotal').textContent = format(goldData.price * goldOz);
            document.getElementById('silverPrice').textContent = format(silverData.price);
            document.getElementById('silverTotal').textContent = format(silverData.price * silverOz);
            document.getElementById('totalValue').textContent = format((goldData.price * goldOz) + (silverData.price * silverOz));

            document.getElementById('timestamp').textContent = 'Stand: ' + new Date().toLocaleString('de-DE');
            resDiv.classList.add('show');
        } catch (e) {
            errDiv.textContent = e.message === "KEY_ERROR" ? "Ungültiger API-Key!" : "Fehler beim Abruf der Daten.";
            errDiv.classList.add('show');
        } finally {
            loader.style.display = 'none';
        }
    }

    function format(v) {
        return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(v);
    }
</script>

</body>
</html>
