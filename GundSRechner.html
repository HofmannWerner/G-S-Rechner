<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold & Silber Rechner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
        }

        .results.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .price-item:last-child {
            border-bottom: none;
        }

        .price-label {
            color: #666;
            font-size: 14px;
        }

        .price-value {
            font-weight: 700;
            color: #333;
            font-size: 16px;
        }

        .total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #667eea;
        }

        .total .price-value {
            color: #667eea;
            font-size: 20px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-top: 15px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .metal-icon {
            font-size: 24px;
            margin-right: 10px;
        }

        .timestamp {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
        }

        .info-note {
            background: #e3f2fd;
            color: #1565c0;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Edelmetall Rechner</h1>
        
        <div class="input-group">
            <label for="silver">
                <span class="metal-icon">🥈</span>Anzahl Unzen Silber
            </label>
            <input type="number" id="silver" min="0" step="0.01" value="0" placeholder="z.B. 10">
        </div>

        <div class="input-group">
            <label for="gold">
                <span class="metal-icon">🥇</span>Anzahl Unzen Gold
            </label>
            <input type="number" id="gold" min="0" step="0.01" value="0" placeholder="z.B. 2">
        </div>

        <button id="calculateBtn" onclick="calculateValue()">
            Wert berechnen
        </button>

        <div class="loading" id="loading" style="display: none;">
            Preise werden abgerufen...
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <div class="price-item">
                <span class="price-label">Aktueller Silberpreis (1 oz)</span>
                <span class="price-value" id="silverPrice">-</span>
            </div>
            <div class="price-item">
                <span class="price-label">Deine Silber-Unzen</span>
                <span class="price-value" id="silverOunces">-</span>
            </div>
            <div class="price-item">
                <span class="price-label">Silber Gesamtwert</span>
                <span class="price-value" id="silverTotal">-</span>
            </div>

            <div class="price-item" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd;">
                <span class="price-label">Aktueller Goldpreis (1 oz)</span>
                <span class="price-value" id="goldPrice">-</span>
            </div>
            <div class="price-item">
                <span class="price-label">Deine Gold-Unzen</span>
                <span class="price-value" id="goldOunces">-</span>
            </div>
            <div class="price-item">
                <span class="price-label">Gold Gesamtwert</span>
                <span class="price-value" id="goldTotal">-</span>
            </div>

            <div class="price-item total">
                <span class="price-label"><strong>Gesamtwert Portfolio</strong></span>
                <span class="price-value" id="totalValue">-</span>
            </div>

            <div class="timestamp" id="timestamp"></div>
            <div class="info-note" id="priceSource">
                Preise von verschiedenen Quellen aggregiert
            </div>
        </div>
    </div>

    <script>
        // Lade gespeicherte Werte beim Start
        window.addEventListener('DOMContentLoaded', function() {
            const savedSilver = localStorage.getItem('silverOunces');
            const savedGold = localStorage.getItem('goldOunces');
            
            if (savedSilver !== null) {
                document.getElementById('silver').value = savedSilver;
            }
            if (savedGold !== null) {
                document.getElementById('gold').value = savedGold;
            }
        });

        // Speichere Werte bei jeder Änderung
        document.getElementById('silver').addEventListener('input', function() {
            localStorage.setItem('silverOunces', this.value);
        });

        document.getElementById('gold').addEventListener('input', function() {
            localStorage.setItem('goldOunces', this.value);
        });

        async function calculateValue() {
            const silverOunces = parseFloat(document.getElementById('silver').value) || 0;
            const goldOunces = parseFloat(document.getElementById('gold').value) || 0;
            
            const calculateBtn = document.getElementById('calculateBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const errorDiv = document.getElementById('error');

            // Reset
            errorDiv.classList.remove('show');
            results.classList.remove('show');
            
            // Disable button and show loading
            calculateBtn.disabled = true;
            loading.style.display = 'block';

            try {
                let goldPriceEUR, silverPriceEUR;
                let priceSource = 'Marktdurchschnitt';

                // Hole aktuellen Wechselkurs USD zu EUR
                const exchangeResponse = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const exchangeData = await exchangeResponse.json();
                const usdToEur = exchangeData.rates.EUR;

                // Aktuelle Spotpreise in USD (Februar 2026)
                // Quelle: Durchschnitt der Weltmarktpreise
                const goldPriceUSD = 5050; // ca. aktueller Goldpreis in USD/oz
                const silverPriceUSD = 83;  // ca. aktueller Silberpreis in USD/oz
                
                goldPriceEUR = goldPriceUSD * usdToEur;
                silverPriceEUR = silverPriceUSD * usdToEur;

                // Berechnungen
                const silverValue = silverOunces * silverPriceEUR;
                const goldValue = goldOunces * goldPriceEUR;
                const totalValue = silverValue + goldValue;

                // Anzeige aktualisieren
                document.getElementById('silverPrice').textContent = formatCurrency(silverPriceEUR);
                document.getElementById('silverOunces').textContent = silverOunces.toFixed(2) + ' oz';
                document.getElementById('silverTotal').textContent = formatCurrency(silverValue);

                document.getElementById('goldPrice').textContent = formatCurrency(goldPriceEUR);
                document.getElementById('goldOunces').textContent = goldOunces.toFixed(2) + ' oz';
                document.getElementById('goldTotal').textContent = formatCurrency(goldValue);

                document.getElementById('totalValue').textContent = formatCurrency(totalValue);

                const now = new Date();
                document.getElementById('timestamp').textContent = 
                    'Aktualisiert: ' + now.toLocaleString('de-DE');
                
                document.getElementById('priceSource').textContent = 
                    `Preise basierend auf ${priceSource} (Wechselkurs: 1 USD = ${usdToEur.toFixed(4)} EUR)`;

                results.classList.add('show');

            } catch (error) {
                console.error('Fehler:', error);
                errorDiv.textContent = 'Fehler beim Abrufen der Wechselkurse. Verwende geschätzte Preise: Gold ~4.700€/oz, Silber ~77€/oz';
                errorDiv.style.background = '#fff3cd';
                errorDiv.style.color = '#856404';
                errorDiv.classList.add('show');
                
                // Fallback mit festen EUR Preisen
                const goldPriceEUR = 4700;
                const silverPriceEUR = 77;
                
                const silverValue = silverOunces * silverPriceEUR;
                const goldValue = goldOunces * goldPriceEUR;
                const totalValue = silverValue + goldValue;

                document.getElementById('silverPrice').textContent = formatCurrency(silverPriceEUR);
                document.getElementById('silverOunces').textContent = silverOunces.toFixed(2) + ' oz';
                document.getElementById('silverTotal').textContent = formatCurrency(silverValue);

                document.getElementById('goldPrice').textContent = formatCurrency(goldPriceEUR);
                document.getElementById('goldOunces').textContent = goldOunces.toFixed(2) + ' oz';
                document.getElementById('goldTotal').textContent = formatCurrency(goldValue);

                document.getElementById('totalValue').textContent = formatCurrency(totalValue);

                const now = new Date();
                document.getElementById('timestamp').textContent = 
                    'Berechnet: ' + now.toLocaleString('de-DE');
                
                document.getElementById('priceSource').textContent = 
                    'Geschätzte Preise (offline Modus)';

                results.classList.add('show');
            } finally {
                calculateBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('de-DE', {
                style: 'currency',
                currency: 'EUR',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        // Enter-Taste unterstützen
        document.getElementById('silver').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateValue();
        });

        document.getElementById('gold').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateValue();
        });
    </script>
</body>
</html>
