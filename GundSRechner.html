<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bianca & Werners Goldrechner</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #d4af37; text-align: center; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #d4af37; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #b8962e; }
        .result { margin-top: 20px; padding: 15px; background: #eef; border-radius: 5px; }
        .footer { font-size: 10px; color: #888; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>G & S Rechner</h2>

    <label for="apiKey">API Key (wird gespeichert):</label>
    <input type="password" id="apiKey" placeholder="Hier Key einfügen">

    <label for="goldUnzen">Anzahl Unzen Gold:</label>
    <input type="number" id="goldUnzen" step="0.01" placeholder="0.00">

    <label for="silberUnzen">Anzahl Unzen Silber:</label>
    <input type="number" id="silberUnzen" step="0.01" placeholder="0.00">

    <button onclick="berechneWerte()">Preise laden & berechnen</button>

    <div id="ausgabe" class="result" style="display:none;">
        <strong>Aktueller Wert:</strong>
        <p id="goldErgebnis">Gold: -</p>
        <p id="silberErgebnis">Silber: -</p>
        <hr>
        <p id="gesamtErgebnis"><strong>Gesamt: -</strong></p>
    </div>
    
    <div class="footer">Stand: <span id="zeitstempel">-</span></div>
</div>

<script>
    // 1. Laden der gespeicherten Werte beim Start
    window.onload = function() {
        if (localStorage.getItem('goldKey')) document.getElementById('apiKey').value = localStorage.getItem('goldKey');
        if (localStorage.getItem('goldUnzen')) document.getElementById('goldUnzen').value = localStorage.getItem('goldUnzen');
        if (localStorage.getItem('silberUnzen')) document.getElementById('silberUnzen').value = localStorage.getItem('silberUnzen');
    };

    async function berechneWerte() {
        const key = document.getElementById('apiKey').value.trim();
        const gUnzen = document.getElementById('goldUnzen').value;
        const sUnzen = document.getElementById('silberUnzen').value;

        // 2. Werte lokal auf dem iPhone merken
        localStorage.setItem('goldKey', key);
        localStorage.setItem('goldUnzen', gUnzen);
        localStorage.setItem('silberUnzen', sUnzen);

        if (!key) {
            alert("Bitte erst den API Key eingeben!");
            return;
        }

        try {
            // Beispiel-Abfrage (hier musst du ggf. die URL deines Anbieters anpassen)
            const response = await fetch(`https://www.goldapi.io/api/XAU/EUR`, {
                headers: { "x-access-token": key }
            });
            const dataGold = await response.json();
            
            const responseSilber = await fetch(`https://www.goldapi.io/api/XAG/EUR`, {
                headers: { "x-access-token": key }
            });
            const dataSilber = await responseSilber.json();

            if (dataGold.price && dataSilber.price) {
                const goldWert = dataGold.price * gUnzen;
                const silberWert = dataSilber.price * sUnzen;

                document.getElementById('ausgabe').style.display = 'block';
                document.getElementById('goldErgebnis').innerText = `Gold: ${goldWert.toFixed(2)} €`;
                document.getElementById('silberErgebnis').innerText = `Silber: ${silberWert.toFixed(2)} €`;
                document.getElementById('gesamtErgebnis').innerHTML = `<strong>Gesamt: ${(goldWert + silberWert).toFixed(2)} €</strong>`;
                document.getElementById('zeitstempel').innerText = new Date().toLocaleString();
            } else {
                alert("Fehler: Key ungültig oder Limit erreicht.");
            }
        } catch (error) {
            alert("Verbindung fehlgeschlagen.");
            console.error(error);
        }
    }
</script>

</body>
</html>
